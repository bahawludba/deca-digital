<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0A0F"/>
      <stop offset="100%" stop-color="#14141F"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C63FF"/>
      <stop offset="100%" stop-color="#00D4AA"/>
    </linearGradient>
    <radialGradient id="glow1" cx="80%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#6C63FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="80%" r="35%">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- Logo -->
  <rect x="80" y="80" width="48" height="48" rx="10" fill="url(#accent)" transform="rotate(-8 104 104)"/>
  <text x="142" y="116" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="36" fill="#EEEEF0">DECA</text>
  <!-- Main text -->
  <text x="80" y="280" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="64" fill="#EEEEF0">AI-Powered Solutions</text>
  <text x="80" y="360" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="64" fill="url(#accent)">That Scale Your Business</text>
  <!-- Subtext -->
  <text x="80" y="430" font-family="'Inter', sans-serif" font-weight="400" font-size="24" fill="#8888A0">AI Assistants · Custom Websites · Business Automation</text>
  <!-- URL -->
  <text x="80" y="560" font-family="'Inter', sans-serif" font-weight="500" font-size="20" fill="#6C63FF">decadigitalconsulting.com</text>
  <!-- Decorative line -->
  <rect x="80" y="470" width="200" height="3" rx="2" fill="url(#accent)" opacity="0.5"/>
</svg>
